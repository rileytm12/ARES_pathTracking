# ARES Configuration File
# All parameters for the searching and planning module

common_params:
  # General parameters
  rover_id: 1                          # Unique identifier for the rover
  rover_name: "Taurus"                   # Name of the rover
  debug: false                          # Enable debug mode for additional logging and visualization

vrpn:
  server: 192.168.20.100
  port: 3883
  frame_id: "world"
  use_server_time: false
  broadcast_tf: true
  refresh_tracker_frequency: 0.2
  update_frequency: 240.0


searching_and_planning:
  # Sensor parameters
  lidar_radius: 4.0                    # meters - LIDAR detection radius
  min_region_length: 1.0               # meters - minimum region length
  absolute_min_region_length: 0.1      # meters - absolute minimum region length
  gap: 0.05                            # meters - gap parameter
  
  # Robot parameters
  rover_radius: 0.15                   # meters - rover physical radius
  radius_inflation: 1.3                # inflation factor for rover radius when adding path obstacles
  
  # Map parameters (grid resolution)
  map_width: 250                        # cells - map width in grid cells
  map_height: 250                       # cells - map height in grid cells
  
  # Map bounds (world coordinates)
  x_min: 0.0                           # meters - minimum X coordinate
  x_max: 5                           # meters - maximum X coordinate
  y_min: 0.0                           # meters - minimum Y coordinate
  y_max: 5                           # meters - maximum Y coordinate
  
  # Note: Make sure X and Y have the same resolution
  # Resolution = (x_max - x_min) / map_width = (y_max - y_min) / map_height

path_tracking:
  # CLA params
  LA_const: 0.5         # meters - constant lookahead
  linVel_const: 0.15    # m/s - constant linear velocity

  # VLA params
  angVelClamp: 2.0        # rad/s - maximum allowed angular vel
  linVel_min: 0.05      # m/s - minimum allowed linear vel
  linVel_max: 0.2         # m/s - maximum allowed linear vel
  LA_min: 0.3           # meters - minimum allowed lookahead
  LA_max: 0.7             # meters - maximum allowed lookahead

  # turn-in-place and stopping distance
  turnRateInPlace: 0.2           # rad/s - turn-in-place angular rate
  stopDist: 0.1         # meters - stopping distance at last waypoint
  trackingAngle: 15.0     # degrees - If turning angle is greater than trackingAngle then turn in place